<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Calculator Grid</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <!-- <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script> -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script data-main="/src/js/lib/main" src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>

<body class="bg-[#EECCFF] font-['Inter',sans-serif] min-h-screen grid place-items-center m-0 p-0 box-border">

    <div class="calculator w-[360px] bg-[#F9F9F9] rounded-[40px] p-8">
        <div class="buttons-calc grid grid-cols-4 gap-4">
            
            <div class="screen bg-[#EBF4F3] h-20 rounded-[24px] px-6 col-span-4 flex items-center justify-end text-right shadow-[6px_6px_12px_rgba(0,0,0,0.06)]">
                <span class="result text-[48px] text-[#737477] font-normal">0</span>
            </div>
            
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">clr</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">DEL</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">%</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">/</button>

            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">7</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">8</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">9</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">*</button>

            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">4</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">5</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">6</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">-</button>

            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">1</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">2</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">3</button>
            <button class="btn text-dark h-14 bg-[#ECF0F3] border-none rounded-full text-[16px] font-bold text-[#392B17] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">+</button>

            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">.</button>
            <button class="btn h-14 bg-[#ECF0F3] border-none rounded-full text-[18px] font-medium text-[#333333] cursor-pointer outline-none shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">0</button>
            <button class="btn btn-equal h-14 bg-[#E2ADCB] text-[#333333] text-[22px] col-span-2 rounded-[28px] shadow-[6px_6px_12px_rgba(0,0,0,0.06)] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.05)]">=</button>
        </div>
    </div>

</body>

</html>
